name: HDUNGINVEST Daily Briefing

on:
  schedule:
    # GitHub cron uses UTC. 00:00 UTC = 07:00 Vietnam time.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-1.5-flash' }}
          BRAND_NAME: HDUNGINVEST
          SITE_NAME: HDUNGINVEST Daily Research
          FOOTER_TEXT: HDUNGINVEST · Daily Market Briefing
          CONTACT_PHONE: 098xxxxxxx
          ZALO_QR_PATH: assets/qr-zalo.png
        run: python scripts/generate_briefing.py

      - name: Commit generated briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html bantin/*.html bantin/*.json assets/css/style.css assets/qr-zalo.png assets/logo.png
          git diff --cached --quiet || git commit -m "Add daily market briefing"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
